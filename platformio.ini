; =============================================================================
; BlueSlaveP4 — PlatformIO Configuration
; Guition ESP32-P4 JC1060P470C (7" MIPI-DSI, 16MB Flash, 32MB PSRAM)
; RED808 V6 — Visual Beast (HMI Display)
; =============================================================================
;
; NOTE: ESP32-P4 support in pioarduino/Arduino-ESP32 is still maturing.
;       If Arduino framework fails, switch to framework = espidf.
;       The code uses ESP-IDF APIs (esp_lcd, freertos) that work in both.
;
; BOARD: Guition JC1060P470C
;   Display: 1024×600 MIPI-DSI 2-lane (JD9165BA)
;   Touch:   GT911 I2C (0x5D)
;   WiFi:    ESP32-C6 companion (SDIO ESP-Hosted → WiFi/UDP to Master)
;   PSRAM:   32MB OPI
;   Flash:   16MB QIO

[platformio]
build_cache_dir = .pio/build_cache

[env:esp32p4]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-p4
framework = arduino
build_src_filter = +<*>
build_flags = 
	-O2
	-DCORE_DEBUG_LEVEL=1
	-DP4_ENABLE_DEBUG_LOG=0
	-DARDUINO_USB_MODE=1
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_LVGL_H_INCLUDE_SIMPLE
	-I include
	-I src/drivers
	-I src/ui
	; Guition JC1060P470C pin definitions
	-DLCD_H_RES=1024
	-DLCD_V_RES=600
	-DMIPI_DSI_LANES=2
	-DMIPI_DSI_LANE_BITRATE_MBPS=550
	-DLCD_BL_GPIO=23
	-DLCD_RST_GPIO=27
	-DTOUCH_RST_GPIO=22
	-DTOUCH_INT_GPIO=21
	-DTOUCH_I2C_SDA=7
	-DTOUCH_I2C_SCL=8
	-DTOUCH_I2C_ADDR=0x5D
lib_deps =
	lvgl/lvgl@8.3.11
	bblanchon/ArduinoJson@^7.0.0
board_build.partitions = partitions_16mb.csv
board_build.flash_size = 16MB
board_build.filesystem = spiffs
board_build.sdkconfig_defaults = sdkconfig.defaults
; Descomenta la siguiente línea SOLO si COM21 es el USB-JTAG nativo del ESP32-P4
; (upload ~3-5x más rápido). Si falla, vuelve a comentarla.
; upload_protocol = esp-builtin
upload_port = COM21
upload_speed = 921600
monitor_port = COM21
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; --- Optimized firmware env for day-to-day playing -------------------------
; Keeps esp32p4 as the debug-friendly build, but gives a lower-overhead target
; for latency/render checks on hardware.
[env:esp32p4-release]
extends = env:esp32p4
build_unflags =
	-O2
	-DCORE_DEBUG_LEVEL=1
build_flags =
	${env:esp32p4.build_flags}
	-O2
	-DCORE_DEBUG_LEVEL=1
	-DP4_ENABLE_DEBUG_LOG=0

; --- Slower-speed env used ONLY for SPIFFS upload ---------------------------
; Partition reduced to 1 MB so uploadfs is quick and stable over COM21.
[env:esp32p4-fs]
extends = env:esp32p4
upload_speed = 460800
build_flags =
	${env:esp32p4.build_flags}
	-DP4_ENABLE_FX_SYNC_LOG=1
; The P4 USB-Serial/JTAG bridge resets before the first write block when the
; stub flasher is used for SPIFFS. Bypass the stub and disable pre/post resets.
upload_flags =
    --no-stub
    --before=no_reset
    --after=no_reset

; --- Diagnostic build: FX sync logs + auto-reset after upload ---------------
; Use this env to debug FX visual sync. P4 resets automatically after upload
; so Serial/USB-CDC output is visible in the monitor immediately.
; NOTE: --no-stub is REQUIRED for ESP32-P4 USB-JTAG. Without it esptool
; reports success but writes corrupted/empty flash.
[env:esp32p4-diag]
extends = env:esp32p4
build_flags =
    ${env:esp32p4.build_flags}
    -DP4_ENABLE_FX_SYNC_LOG=1
    -DP4_ENABLE_DEBUG_LOG=1
upload_flags =
    --no-stub
    --before=no_reset
    --after=hard_reset
